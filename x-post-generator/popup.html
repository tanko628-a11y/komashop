<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>X Post Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h2>X Post Generator v3</h2>
    <p class="subtitle">全パターン同時表示＆コピー</p>

    <div class="input-section">
      <div class="form-group">
        <label>エントリー価格</label>
        <input type="number" id="entryPrice" placeholder="4740.38" step="0.01">
      </div>

      <div class="form-group">
        <label>決済価格</label>
        <input type="number" id="exitPrice" placeholder="4764.9" step="0.01">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>商品</label>
          <select id="instrument">
            <option>GOLD</option>
            <option>EURUSD</option>
            <option>GBPUSD</option>
            <option>USDJPY</option>
          </select>
        </div>

        <div class="form-group">
          <label>方向</label>
          <select id="direction">
            <option>LONG</option>
            <option>SHORT</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>ハッシュタグ選択</label>
        <div class="hashtag-section">
          <div class="hashtag-top">
            <p class="section-label">需要順ハッシュタグ</p>
            <label><input type="checkbox" class="hashtag-checkbox" value="#FX" checked> #FX (★★★★★)</label>
            <label><input type="checkbox" class="hashtag-checkbox" value="#トレード実績" checked> #トレード実績 (★★★★★)</label>
            <label><input type="checkbox" class="hashtag-checkbox" value="#順張り"> #順張り (★★★★☆)</label>
            <label><input type="checkbox" class="hashtag-checkbox" value="#VWAP"> #VWAP (★★★☆☆)</label>
            <label><input type="checkbox" class="hashtag-checkbox" value="#Laguerre_RSI"> #Laguerre_RSI (★★★☆☆)</label>
            <label><input type="checkbox" class="hashtag-checkbox" value="#MT4"> #MT4 (★★★☆☆)</label>
          </div>

          <div class="hashtag-bottom">
            <p class="section-label">推奨ハッシュタグ（自動出力）</p>
            <div id="recommendedHashtags" class="recommended-tags">
              <span>#コマ式FX練成会</span>
              <span>#Koma_Ultimate</span>
              <span>#複数指標検証</span>
            </div>
            <p class="section-label">カスタムハッシュタグ追加</p>
            <input type="text" id="customHashtags" placeholder="#秘匿指標, #実戦トレード">
          </div>
        </div>
      </div>

      <button id="generateBtn" class="btn-primary">全パターンを生成</button>
    </div>

    <div id="postsContainer" class="posts-container"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
